<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/register.css">
    <title>Document</title>
</head>
<body>
    <main>
        <div class="back_img">
            <img src="assets/banniere/Banniere Poe2.png" alt="error">
            <div class="haut">
        </div>
        </div>
        <div class="second">
            <div id="error-message" class="error-message"></div>
            
                
        <div class="register">
            <form class="form" id="register_form">

            <div class="field">
                <label for="username">User Name (Identifiant)</label>
                <input type="text" id="username" class="input" name="username" placeholder="User Name" required>
            </div>

            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" class="input" name="email" placeholder="Adresse Email" required>
            </div>

            <div class="field">
                <label for="display-name">Display Name</label>
                <input type="text" id="display_name" class="input" name="display_name" placeholder="Display Name">
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" class="input" name="password" autocomplete="new-password" placeholder="*********" required> 
            </div>
            <p class="paragraph">
                Already have an account? <a class="link" href="login.html">Sign in</a>
            </p>
            <div class="actions">
                <div class="checkbox-container">
                    <p>I am agree with the <a class="link" href="#">privacy policy</a></p>
                    <div class="content">
                        <label class="checkBox">
                            
                            <input id="ch1" type="checkbox" required>
                            <div class="transition"></div>
                        </label>
                    </div>
                </div>
                <button type="submit" class="valider">Valider</button>
            </div>

            </form>
        </div>

                
            </div>

    </main>

    <footer>
        <div class="footer">
            <div class="liens">
                <h3><a class="lien" href="#">Terms of Service</a></h3>
                <h3><a class="lien" href="#">Privacy Policy</a></h3>
                <h3><a class="lien" href="#">Accessibility</a></h3>
                <h3><a class="lien" href="#">Refund Policy</a></h3>
                <h3><a class="lien" href="#">Contact Us</a></h3>
            </div>
            <div class="reseau">
                <a href="#"><img src="assets/icons/youtube.png" alt="youtube" class="icon"></a>
                <a href="#"><img src="assets/icons/twitch.png" alt="twitch" class="icon"></a>
                <a href="#"><img src="assets/icons/discord.png" alt="discord" class="icon"></a>
            </div>
        </div>
    </footer>

    <script src="js/pages/register.js"></script>
</body>
</html>
